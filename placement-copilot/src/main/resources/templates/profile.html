<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/dashboard2.css}">

</head>

<body>

<div class="dashboard-container">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main-content">

        <div th:replace="~{fragments/navbar :: navbar}"></div>

        <div class="content">

            <h2 class="page-title">My Profile</h2>

            <div class="dashboard-card">

                <form th:action="@{/profile/update}"
                      th:object="${student}"
                      method="post">

                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text"
                               class="form-control"
                               th:field="*{name}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email"
                               class="form-control"
                               th:field="*{email}"
                               readonly>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Phone</label>
                        <input type="text"
                               class="form-control"
                               th:field="*{phone}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Branch</label>
                        <input type="text"
                               class="form-control"
                               th:field="*{branch}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">CGPA</label>
                        <input type="number"
                               step="0.01"
                               class="form-control"
                               th:field="*{cgpa}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Graduation Year</label>
                        <input type="number"
                               class="form-control"
                               th:field="*{graduationYear}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">University</label>
                        <input type="text"
                               class="form-control"
                               th:field="*{university}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Skills</label>
                        <textarea class="form-control"
                                  rows="3"
                                  th:field="*{skills}"></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Resume URL</label>
                        <input type="text"
                               class="form-control"
                               th:field="*{resumeUrl}">
                    </div>

                    <button type="submit"
                            class="btn btn-primary">
                        Update Profile
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
