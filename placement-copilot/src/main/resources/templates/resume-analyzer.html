<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Resume Analyzer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/dashboard2.css}">
    <link rel="stylesheet" th:href="@{/css/resume-analyzer.css}">

</head>

<body>

<div class="dashboard-container">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main-content">

        <div th:replace="~{fragments/navbar :: navbar}"></div>

        <div class="content">

            <h2 class="page-title">AI Resume Analyzer</h2>

            <!-- Upload Card -->

            <div class="upload-card">

                <div class="resume-file">

                    📄 <strong>resume.pdf</strong>

                    <span>445 KB</span>

                </div>

                <button class="btn-change">
                    Change File
                </button>

                <button class="btn-analyze">
                    Analyze Resume
                </button>

            </div>

            <!-- Report -->

            <div class="report-grid">

                <!-- Score -->

                <div class="report-card">

                    <h4>Analysis Report</h4>

                    <div class="score-circle">

                        <span>78</span>

                        <small>/100</small>

                    </div>

                    <p class="score-text">
                        Resume Score
                    </p>

                </div>

                <!-- Strength -->

                <div class="report-card">

                    <h4>Strengths</h4>

                    <ul class="good-list">

                        <li>✔ Good project descriptions</li>

                        <li>✔ Relevant skills found</li>

                        <li>✔ Experience is mentioned</li>

                    </ul>

                    <h4 class="mt-4">
                        Improvements
                    </h4>

                    <ul class="bad-list">

                        <li>⚠ Add more certifications</li>

                        <li>⚠ Include internship details</li>

                        <li>⚠ Improve Skills section</li>

                    </ul>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
